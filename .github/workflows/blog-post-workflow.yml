name: Latest Blog Post Workflow

on:
  # Runs every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Pull in Medium blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # Your Medium RSS feed URL
          feed_list: "https://medium.com/feed/@songulkizilay"
          # Maximum number of posts to show
          max_post_count: 5
          # Comment markers in your README.md where posts will be inserted
          comment_tag_name: "BLOG-POST-LIST"
          # Template for displaying each post
          template: "- 📝 [$title]($url) - $newline *Published on $date*"
          # Date format
          date_format: "dd mmm yyyy"
          # Commit message
          commit_message: "Updated with latest blog posts"
          # Commit author name
          committer_username: "blog-post-bot"
          # Commit author email  
          committer_email: "blog-post-bot@example.com"
