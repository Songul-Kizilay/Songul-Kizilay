name: Latest Blog Posts

on:
  schedule:
    - cron: "0 */6 * * *"  # Her 6 saatte bir
  workflow_dispatch:       # Manuel çalıştırma

jobs:
  update-readme:
    permissions:
      contents: write        # README'yi güncelleme izni
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Update README with Medium posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@songulkizilay"
          max_post_count: 5
          template: "- 📝 **[$title]($url)**"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "📝 Blog yazıları güncellendi"
          committer_username: "github-actions[bot]"
          committer_email: "github-actions[bot]@users.noreply.github.com"
